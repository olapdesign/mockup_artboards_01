# ----------------------------
# Canvas
# ----------------------------
[canvas]
width = "background_image_width"
height = "background_image_height"
background_image = "images/image_background.png"
background_color = "#FFFFFF"

[config_print]
dpi = 150

# ----------------------------
# Elements
# ----------------------------

[[element]]
id = 1
type = "draping_preview_mask"
mask = "images/image_mask_artwork_primary_0.png"
suitable_content = "preview_artwork_draping"
content_blend_mode = "multiply"
z-index = 2

[[element]]
id = 1
type = "draping_preview_mask"
mask = "images/image_mask_artwork_secondary_1.png"
suitable_content = "preview_artwork_draping_secondary_1"
content_blend_mode = "multiply"
z-index = 1

[[element]]
id = 1
type = "draping_preview_mask"
mask = "images/image_mask_artwork_secondary_2.png"
suitable_content = "preview_artwork_draping_secondary_2"
content_blend_mode = "multiply"
z-index = 1

[[element]]
id = 2
type = "draping_preview_base"
source_image = "images/image_model.png"
z-index = 0
